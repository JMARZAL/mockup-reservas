<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selección de Almacén</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #2c3e50; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; padding: 20px; box-sizing: border-box; }
        .modal-overlay { background: rgba(0,0,0,0.5); position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; padding: 15px; }
        /* AJUSTE RESPONSIVE: Ancho máximo en lugar de fijo */
        .modal-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: center; width: 100%; max-width: 400px; }
        select { width: 100%; padding: 12px; margin: 20px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 1rem; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
        button { flex: 1; min-width: 120px; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-aceptar { background: #2ecc71; color: white; }
        .btn-cancelar { background: #e74c3c; color: white; }
        
        .watermark-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; pointer-events: none; z-index: 10000; overflow: hidden; }
        .watermark-text { color: rgba(0, 0, 0, 0.05); font-size: 7vw; font-weight: 900; text-transform: uppercase; transform: rotate(-35deg); white-space: nowrap; user-select: none; }
    </style>
</head>
<body>

<div class="modal-overlay">
    <div class="modal-box">
        <h2>Bienvenido</h2>
        <p>Seleccione un almacén para empezar:</p>
        <select id="warehouse-selector">
            <option value="OVIEDO">002 - OVIEDO</option>
            <option value="ALMERIA">003 - ALMERIA</option>
            <option value="LEGANES">004 - LEGANES</option>
            <option value="MASSANASSA">005 - MASSANASSA</option>
            <option value="CASTELLON">006 - CASTELLON</option>
            <option value="RIVAS">007 - RIVAS</option>
            <option value="MALAGA">008 - MALAGA</option>
            <option value="VALLADOLID">010 - VALLADOLID</option>
            <option value="MAJADAHONDA">011 - MAJADAHONDA</option>
            <option value="USERA">012 - USERA</option>
            <option value="RESTO">NNN - RESTO</option>
        </select>
        <div class="btn-group">
            <button class="btn-cancelar" onclick="window.location.href='sin-informacion.html'">CANCELAR</button>
            <button class="btn-aceptar" onclick="irAAlmacen()">ACEPTAR</button>
        </div>
    </div>
</div>

<script>
    function irAAlmacen() {
        const select = document.getElementById('warehouse-selector');
        const nombreAlmacen = select.options[select.selectedIndex].text;
        localStorage.setItem('almacenActual', nombreAlmacen);
        window.location.href = 'almacen.html';
    }
</script>
<div class="watermark-overlay"><span class="watermark-text">MOCKUP DIGITAL. USO INTERNO</span></div>
</body>
</html>
